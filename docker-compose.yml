services:
  postgres:
    image: postgres:16.9-alpine
    container_name: study_tools_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-study_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-study_tools}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-study_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: study_tools_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

volumes:
  pgdata:
